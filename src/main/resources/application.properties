# ============================================================
# Application
# ============================================================
spring.application.name=user-management
server.port=${PORT:8080}

# ============================================================
# H2 In-Memory Database
# ============================================================
spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Initialize data
# ============================================================
spring.sql.init.mode=always
# Defer data.sql execution until after Hibernate has created the schema
spring.jpa.defer-datasource-initialization=true

# ============================================================
# Actuator - expose all endpoints (INSECURE - for demo only)
# TODO: Restrict actuator endpoints in production
# ============================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=always

# ============================================================
# Logging
# ============================================================
logging.level.com.demo.usermanagement=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# ============================================================
# Springdoc / Swagger
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
